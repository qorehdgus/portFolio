apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: controller-service
spec:
  selector:
    app: llm
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: modelserver-service
spec:
  selector:
    app: llm
  ports:
  - port: 8001
    targetPort: 8001
  type: LoadBalancer
